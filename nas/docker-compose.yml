services:
  toro-bot:
    image: dusehd1/toro-bot:latest
    container_name: toro-bot
    restart: unless-stopped
    ports:
      - "9482:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/toro.db}
    volumes:
      - ./data:/app/data
