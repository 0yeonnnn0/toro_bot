services:
  toro:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/toro.db}
      CODEX_HOME: ${CODEX_HOME:-/codex}
    volumes:
      - ./data:/app/data
      - ${CODEX_HOME_HOST:-./codex}:/codex

